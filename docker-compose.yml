version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: clariva_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: clariva
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: clariva_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@clariva.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - db

volumes:
  postgres_data:
